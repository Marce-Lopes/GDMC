"# =============================================================================
# GDMC-EU — Docker Compose para Linux (com resource limits)
# =============================================================================
# Cada serviço Java limitado a 512MB RAM / 0.5 CPU
# Total estimado: ~10GB RAM para todos os serviços
# =============================================================================

version: "3.8"

x-common-env: &common-env
  SPRING_PROFILES_ACTIVE: local
  TZ: America/Sao_Paulo

x-common-java: &common-java
  restart: unless-stopped
  mem_limit: 512m
  cpus: 0.5
  environment:
    <<: *common-env
    DB_USERNAME: root
    DB_PASSWORD: gdmc123
    SPRING_DATASOURCE_USERNAME: root
    SPRING_DATASOURCE_PASSWORD: gdmc123
    SPRING_REDIS_HOST: redis
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    JAVA_OPTS: "-Xms256m -Xmx384m"

services:
  # ─────────────────────────────────────────────
  # INFRAESTRUTURA
  # ─────────────────────────────────────────────

  mysql:
    image: mysql:5.7
    container_name: gdmc-mysql
    mem_limit: 1g
    cpus: 1.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: gdmc123
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - gdmc-mysql-data:/var/lib/mysql
      - ./infra-local/sql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pgdmc123"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:6.2-alpine
    container_name: gdmc-redis
    mem_limit: 256m
    cpus: 0.25
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: bitnami/zookeeper:3.7
    container_name: gdmc-zookeeper
    mem_limit: 256m
    cpus: 0.25
    ports:
      - "2181:2181"
    environment:
      ALLOW_ANONYMOUS_LOGIN: "yes"
    volumes:
      - gdmc-zookeeper-data:/bitnami

  kafka:
    image: bitnami/kafka:2.6.0
    container_name: gdmc-kafka
    mem_limit: 512m
    cpus: 0.5
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_ZOOKEEPER_CONNECT: zookeeper:2181
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    volumes:
      - gdmc-kafka-data:/bitnami

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.0
    container_name: gdmc-xxl-job-admin
    mem_limit: 384m
    cpus: 0.25
    ports:
      - "8494:8080"
    environment:
      PARAMS: "--spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useSSL=false&allowPublicKeyRetrieval=true --spring.datasource.username=root --spring.datasource.password=gdmc123"
    depends_on:
      mysql:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────────

  api-gateway:
    <<: *common-java
    image: gdmc/api-gateway:local
    container_name: gdmc-api-gateway
    ports:
      - "8000:8080"
    depends_on:
      - master-data
      - sales-order
      - purchase-order
      - inventory

  # ─────────────────────────────────────────────
  # BFFs
  # ─────────────────────────────────────────────

  web-bff:
    <<: *common-java
    image: gdmc/web-bff:local
    container_name: gdmc-web-bff
    ports:
      - "8001:80"
    depends_on:
      - sales-order
      - purchase-order
      - master-data
      - org-user

  mobile-bff:
    <<: *common-java
    image: gdmc/mobile-bff:local
    container_name: gdmc-mobile-bff
    ports:
      - "8002:80"
    depends_on:
      - sales-order
      - purchase-order
      - master-data
      - org-user

  # ─────────────────────────────────────────────
  # CORE SERVICES
  # ─────────────────────────────────────────────

  master-data:
    <<: *common-java
    image: gdmc/master-data:local
    container_name: gdmc-master-data
    ports:
      - "8075:8075"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  org-user:
    <<: *common-java
    image: gdmc/org-user:local
    container_name: gdmc-org-user
    ports:
      - "8079:8079"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  channel-data-center:
    <<: *common-java
    image: gdmc/channel-data-center:local
    container_name: gdmc-channel-data-center
    ports:
      - "8078:8078"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  leads:
    <<: *common-java
    image: gdmc/leads:local
    container_name: gdmc-leads
    ports:
      - "8077:8077"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # BUSINESS SERVICES
  # ─────────────────────────────────────────────

  sales-order:
    <<: *common-java
    image: gdmc/sales-order:local
    container_name: gdmc-sales-order
    ports:
      - "8091:8091"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  purchase-order:
    <<: *common-java
    image: gdmc/purchase-order:local
    container_name: gdmc-purchase-order
    ports:
      - "8090:8090"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  inventory:
    <<: *common-java
    image: gdmc/inventory:local
    container_name: gdmc-inventory
    ports:
      - "8092:8092"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  transport-order:
    <<: *common-java
    image: gdmc/transport-order:local
    container_name: gdmc-transport-order
    ports:
      - "8093:8093"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  payment:
    <<: *common-java
    image: gdmc/payment:local
    container_name: gdmc-payment
    ports:
      - "8094:8094"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  campaign:
    <<: *common-java
    image: gdmc/campaign:local
    container_name: gdmc-campaign
    ports:
      - "8095:8095"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  consent:
    <<: *common-java
    image: gdmc/consent:local
    container_name: gdmc-consent
    ports:
      - "8096:8096"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  retail:
    <<: *common-java
    image: gdmc/retail:local
    container_name: gdmc-retail
    ports:
      - "8097:8097"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started

  warranty:
    <<: *common-java
    image: gdmc/warranty:local
    container_name: gdmc-warranty
    ports:
      - "8098:8098"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  technical:
    <<: *common-java
    image: gdmc/technical:local
    container_name: gdmc-technical
    ports:
      - "8099:8099"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  report:
    <<: *common-java
    image: gdmc/report:local
    container_name: gdmc-report
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  after-sale-problem:
    <<: *common-java
    image: gdmc/after-sale-problem:local
    container_name: gdmc-after-sale-problem
    ports:
      - "8100:8100"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # INTEGRAÇÕES (stub local)
  # ─────────────────────────────────────────────

  sap-integration:
    <<: *common-java
    image: gdmc/sap-integration:local
    container_name: gdmc-sap-integration
    ports:
      - "9010:9010"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  wms-integration:
    <<: *common-java
    image: gdmc/wms-integration:local
    container_name: gdmc-wms-integration
    ports:
      - "9011:9011"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  mdm-integration:
    <<: *common-java
    image: gdmc/mdm-integration:local
    container_name: gdmc-mdm-integration
    ports:
      - "9012:9012"
    depends_on:
      mysql:
        condition: service_healthy

  gbom-integration:
    <<: *common-java
    image: gdmc/gbom-integration:local
    container_name: gdmc-gbom-integration
    ports:
      - "9013:9013"
    depends_on:
      mysql:
        condition: service_healthy

  idms-integration:
    <<: *common-java
    image: gdmc/idms-integration:local
    container_name: gdmc-idms-integration
    ports:
      - "9014:9014"
    depends_on:
      mysql:
        condition: service_healthy

  call-center-integration:
    <<: *common-java
    image: gdmc/call-center-integration:local
    container_name: gdmc-call-center-integration
    ports:
      - "9015:9015"
    depends_on:
      mysql:
        condition: service_healthy

  imp-exp:
    <<: *common-java
    image: gdmc/imp-exp:local
    container_name: gdmc-imp-exp
    ports:
      - "9016:9016"
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  # ─────────────────────────────────────────────
  # WORKFLOW
  # ─────────────────────────────────────────────

  workflow:
    <<: *common-java
    image: gdmc/workflow:local
    container_name: gdmc-workflow
    ports:
      - "8102:8102"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  workflow-engine:
    <<: *common-java
    image: gdmc/workflow-engine:local
    container_name: gdmc-workflow-engine
    ports:
      - "8103:80"
    depends_on:
      mysql:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # DB-FLYWAY
  # ─────────────────────────────────────────────

  db-flyway:
    <<: *common-java
    image: gdmc/db-flyway:local
    container_name: gdmc-db-flyway
    ports:
      - "8033:8033"
    depends_on:
      mysql:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────────

  web-frontend:
    image: gdmc/web-frontend:local
    container_name: gdmc-web-frontend
    mem_limit: 64m
    cpus: 0.1
    ports:
      - "3000:80"
    depends_on:
      - web-bff

volumes:
  gdmc-mysql-data:
  gdmc-zookeeper-data:
  gdmc-kafka-data:"